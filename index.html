<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Penguin AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    h1 span { color: #4fc3f7; }
    p {
      font-size: 1.25rem;
      color: #aaa;
      max-width: 600px;
      line-height: 1.6;
    }
    .badge {
      margin-top: 2rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.875rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Radio Penguin <span>AI</span></h1>
  <p>AI-powered consulting that builds custom business software — so you can stop paying for licenses you don't need.</p>

</html>
